<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>הכנות Rapidos</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: 'Heebo', sans-serif; color: #f0ede6; }
    .app { min-height: 100vh; background: #111; padding-bottom: 60px; }
    .home-header { background: linear-gradient(160deg, #1a1208 0%, #111 65%); padding: 44px 24px 32px; border-bottom: 1px solid #222; text-align: center; }
    .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px; }
    .logo-wrap img { height: 54px; object-fit: contain; }
    .home-header p { color: #555; font-size: 0.88rem; font-weight: 300; }
    .recipes-grid { padding: 28px 20px; display: flex; flex-direction: column; gap: 12px; max-width: 500px; margin: 0 auto; }
    .recipe-card { background: #1a1a1a; border: 1px solid #252525; border-radius: 16px; padding: 18px 20px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.15s ease; }
    .recipe-card:active { transform: scale(0.975); border-color: #c0392b; }
    .recipe-card:hover { background: #1e1e1e; border-color: #333; }
    .recipe-emoji { font-size: 2rem; width: 50px; height: 50px; background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .recipe-info { flex: 1; }
    .recipe-info h2 { font-size: 1.1rem; font-weight: 700; }
    .recipe-info span { font-size: 0.8rem; color: #555; }
    .arrow { color: #444; font-size: 1.2rem; }
    .recipe-detail { max-width: 500px; margin: 0 auto; padding: 0 20px 40px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; margin: 20px 0 22px; background: none; border: 1px solid #2a2a2a; color: #888; font-family: 'Heebo', sans-serif; font-size: 0.88rem; padding: 7px 16px; border-radius: 30px; cursor: pointer; transition: all 0.15s; }
    .back-btn:hover { border-color: #444; color: #ccc; }
    .recipe-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .recipe-emoji-large { font-size: 2.6rem; width: 62px; height: 62px; background: #1a1a1a; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .recipe-header h1 { font-size: 1.6rem; font-weight: 900; color: #c0392b; line-height: 1.1; }
    .ratio-badge { display: inline-block; margin-top: 6px; background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); color: #c0392b; font-size: 0.78rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .scale-box { background: #1a1a1a; border: 1px solid #2a1414; border-radius: 14px; padding: 18px; margin-bottom: 18px; }
    .scale-box label { display: block; font-size: 0.88rem; color: #888; margin-bottom: 10px; }
    .scale-box label strong { color: #ccc; }
    .input-row { display: flex; align-items: center; gap: 8px; }
    .scale-box input { flex: 1; background: #111; border: 1px solid #333; border-radius: 10px; color: #f0ede6; font-family: 'Heebo', sans-serif; font-size: 1.25rem; font-weight: 700; padding: 11px 14px; outline: none; transition: border-color 0.15s; -moz-appearance: textfield; }
    .scale-box input::-webkit-outer-spin-button, .scale-box input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .scale-box input:focus { border-color: #c0392b; }
    .unit-label { font-size: 0.9rem; color: #555; white-space: nowrap; }
    .reset-btn { background: #1e1e1e; border: 1px solid #333; color: #777; font-family: 'Heebo', sans-serif; font-size: 0.8rem; padding: 8px 12px; border-radius: 8px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .reset-btn:hover { border-color: #555; color: #bbb; }
    .section-label { font-size: 0.72rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; }
    .ingredients-list { background: #1a1a1a; border: 1px solid #252525; border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .ingredient-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e1e1e; gap: 10px; }
    .ingredient-row:last-child { border-bottom: none; }
    .ingredient-row.primary-ing .ing-name { color: #c0392b; }
    .ingredient-row.active-ing .ing-name { color: #7dd3a8; }
    .ing-name { font-size: 0.92rem; color: #bbb; flex: 1; line-height: 1.3; }
    .ing-right { flex-shrink: 0; }
    .ing-amount-btn { display: flex; align-items: center; gap: 6px; background: #111; border: 1px solid #2a2a2a; color: #f0ede6; font-family: 'Heebo', sans-serif; font-size: 0.95rem; font-weight: 700; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .ing-amount-btn:hover { border-color: #555; background: #161616; }
    .ing-amount-btn.scaled { color: #c0392b; border-color: rgba(192,57,43,0.25); background: rgba(192,57,43,0.05); }
    .edit-icon { font-size: 0.7rem; opacity: 0.4; }
    .inline-edit { display: flex; align-items: center; gap: 4px; }
    .inline-input { width: 90px; background: #111; border: 1px solid #c0392b; border-radius: 8px; color: #c0392b; font-family: 'Heebo', sans-serif; font-size: 0.95rem; font-weight: 700; padding: 6px 10px; outline: none; -moz-appearance: textfield; }
    .inline-input::-webkit-outer-spin-button, .inline-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .inline-unit { font-size: 0.78rem; color: #666; }
    .instructions-box { background: #1a1a1a; border: 1px solid #252525; border-radius: 14px; padding: 18px; }
    .instructions-box p { font-size: 0.92rem; color: #888; line-height: 1.9; font-weight: 300; }
  </style>
</head>

const { useState } = React;

function makeG(name, grams) { return { name, base: grams, type: "g" }; }
function makeKg(name, kg) { return { name, base: kg * 1000, type: "g" }; }
function makeL(name, liters) { return { name, base: liters * 1000, type: "ml" }; }

function formatAmount(base, type) {
  if (type === "ml") {
    if (base >= 1000) { const l = base/1000; const r = Math.round(l*100)/100; return (r%1===0?r:r.toFixed(2).replace(/\.?0+$/,"")) + " ליטר"; }
    return Math.round(base*10)/10 + " מ״ל";
  } else {
    if (base >= 1000) { const kg = base/1000; const r = Math.round(kg*100)/100; return (r%1===0?r:r.toFixed(2).replace(/\.?0+$/,"")) + " ק״ג"; }
    return Math.round(base*10)/10 + " גרם";
  }
}

function inputUnitLabel(ing, isPrimary) {
  if (isPrimary) return ing.type === "ml" ? "ליטר" : "ק״ג";
  return ing.type === "ml" ? "מ״ל" : "גרם";
}

function inputToBase(val, ing, isPrimary) {
  const n = parseFloat(val);
  if (isNaN(n) || n <= 0) return null;
  return isPrimary ? n * 1000 : n;
}

const recipesData = [
  { id:1, name:"סלסה עגבניות", emoji:"🍅", primaryIndex:0, ingredients:[makeKg("עגבניות",10),makeG("שום מגורד במיקרופליין",27),makeG("פטרוזיליה קצוצה",450),makeG("מיץ לימון",260),makeG("מלח דק",85),makeG("פלפל שחור",25)], instructions:"לקצוץ את העגבניות בחללית. לערבב את שאר המרכיבים ולהוסיף לעגבניות, לערבב ולהעביר לקופסאות עם מדבקה ותאריך." },
  { id:2, name:"גואקמולי", emoji:"🥑", primaryIndex:0, ingredients:[makeKg("קוביות אבוקדו מופשרות",10),makeG("שום מגורד במיקרופליין",35),makeG("מלח דק",135),makeG("פלפל שחור גרוס",35),makeG("שמן ניטרלי",150),makeG("כוסברה קצוצה",170),makeG("בצל סגול קצוץ",1500),makeG("מיץ לימון",450)], instructions:"לערבב טוב עם הידיים עד שהמסה אחידה, להעביר לקופסאות עם תאריך." },

  { id:4, name:"שמן לטאקו", emoji:"🌮", primaryIndex:0, ingredients:[makeL("שמן ניטרלי",2),makeG("תבלין קייגון",200)], instructions:"טוחנים ומערבבים היטב, ניתן להשאיר בגריקן עצמו או להעביר לקופסאות." },
];

function RecipeCard({ recipe, onBack }) {
  const [ratio, setRatio] = useState(1);
  const [activeIdx, setActiveIdx] = useState(recipe.primaryIndex);
  const [primaryInputVal, setPrimaryInputVal] = useState("");
  const [editingIdx, setEditingIdx] = useState(null);
  const primaryIng = recipe.ingredients[recipe.primaryIndex];
  const hasCustom = ratio !== 1;

  function handlePrimaryInput(val) {
    setPrimaryInputVal(val);
    setActiveIdx(recipe.primaryIndex);
    const base = inputToBase(val, primaryIng, true);
    setRatio(base !== null ? base / primaryIng.base : 1);
  }

  function handleIngredientInput(idx, val) {
    setActiveIdx(idx);
    const ing = recipe.ingredients[idx];
    const isPrimary = idx === recipe.primaryIndex;
    const base = inputToBase(val, ing, isPrimary);
    if (base !== null) { setRatio(base / ing.base); if (isPrimary) setPrimaryInputVal(val); }
  }

  function handleReset() { setPrimaryInputVal(""); setRatio(1); setActiveIdx(recipe.primaryIndex); setEditingIdx(null); }

  return (
    <div className="recipe-detail" dir="rtl">
      <button className="back-btn" onClick={onBack}>→ חזרה לרשימה</button>
      <div className="recipe-header">
        <span className="recipe-emoji-large">{recipe.emoji}</span>
        <div>
          <h1>{recipe.name}</h1>
          {hasCustom && <div className="ratio-badge">יחס ×{(Math.round(ratio*100)/100).toFixed(2).replace(/\.?0+$/,"")}</div>}
        </div>
      </div>
      <div className="scale-box">
        <label>כמה יש לך מ<strong>{primaryIng.name}</strong>?</label>
        <div className="input-row">
          <input type="number" placeholder={primaryIng.base/1000} value={activeIdx===recipe.primaryIndex?primaryInputVal:""} onChange={e=>{setEditingIdx(null);handlePrimaryInput(e.target.value);}} />
          <span className="unit-label">{primaryIng.type==="ml"?"ליטר":"ק״ג"}</span>
          {hasCustom && <button className="reset-btn" onClick={handleReset}>איפוס</button>}
        </div>
      </div>
      <div className="ingredients-list">
        <div className="section-label">מרכיבים — לחץ על כמות לעריכה</div>
        {recipe.ingredients.map((ing,i) => {
          const scaled = ing.base * ratio;
          const isEditing = editingIdx === i;
          const isPrimary = i === recipe.primaryIndex;
          const unitLabel = inputUnitLabel(ing, isPrimary);
          return (
            <div className={"ingredient-row"+(isPrimary?" primary-ing":"")+(activeIdx===i&&hasCustom?" active-ing":"")} key={i}>
              <span className="ing-name">{ing.name}</span>
              <div className="ing-right">
                {isEditing ? (
                  <div className="inline-edit">
                    <input autoFocus type="number" className="inline-input" placeholder={unitLabel} onChange={e=>handleIngredientInput(i,e.target.value)} onBlur={()=>setEditingIdx(null)} />
                    <span className="inline-unit">{unitLabel}</span>
                  </div>
                ) : (
                  <button className={"ing-amount-btn"+(hasCustom?" scaled":"")} onClick={()=>setEditingIdx(i)}>
                    {formatAmount(scaled, ing.type)}<span className="edit-icon">✏️</span>
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>
      <div className="instructions-box">
        <div className="section-label">הוראות הכנה</div>
        <p>{recipe.instructions}</p>
      </div>
    </div>
  );
}

function App() {
  const [selected, setSelected] = useState(null);
  const recipe = recipesData.find(r => r.id === selected);
  return (
    <div className="app" dir="rtl">
      {!recipe ? (
        <>
          <div className="home-header">
            <div className="logo-wrap">
              <img src={LOGO} style={{height:"54px",objectFit:"contain"}} alt="Rapidos" />
            </div>
            <p>הכנות המטבח — בחר מתכון לחישוב כמויות</p>
          </div>
          <div className="recipes-grid">
            {recipesData.map(r => (
              <div className="recipe-card" key={r.id} onClick={()=>setSelected(r.id)}>
                <div className="recipe-emoji">{r.emoji}</div>
                <div className="recipe-info"><h2>{r.name}</h2><span>{r.ingredients.length} מרכיבים</span></div>
                <span className="arrow">←</span>
              </div>
            ))}
          </div>
        </>
      ) : (
        <RecipeCard recipe={recipe} onBack={()=>setSelected(null)} />
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
